name: Build and Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  statuses: write
  deployments: write
  actions: write
  checks: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Build Modern JAR
        run: |
          mvn -B clean package
          mkdir -p dist
          mv target/sanscraft-bde-*.jar dist/sanscraft-bde-modern.jar

      # Legacy JAR build is temporarily suspended to focus priorities on other critical bugs.
      # - name: Build Legacy JAR
      #   run: |
      #     mvn -B clean package -Plegacy
      #     mv target/sanscraft-bde-*.jar dist/sanscraft-bde-legacy.jar

      - name: Get current date
        id: date
        run: echo "date=$(date +'%Y%m%d-%H%M%S-%3N')" >> $GITHUB_OUTPUT

      - name: Create Release Tag
        id: tag
        run: |
          TAG=nightly-${{ steps.date.outputs.date }}
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          git tag $TAG
          git push origin $TAG

      - name: Create GitHub Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: Nightly ${{ steps.tag.outputs.tag }}
          draft: false
          prerelease: false
          files: |
            dist/sanscraft-bde-modern.jar
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
